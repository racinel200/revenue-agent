name: Publish Relay (dry run)

# DRY-RUN PHASE — this workflow references NO secret, anywhere. It is
# structurally incapable of making a real commerce API call, not merely
# configured not to. Real execution requires a separately approved change
# that adds a scoped credential to GitHub Actions Secrets (a human
# checkpoint — see morning-queue.md).
#
# Endpoint whitelist, price bounds, rate cap, and the forbidden-key rule are
# enforced in .github/scripts/validate_and_echo.py — see
# publish-requests/SCHEMA.md for the intent format.

on:
  push:
    paths:
      - 'publish-requests/**.json'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  validate-and-echo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate intents and write dry-run results
        run: python3 .github/scripts/validate_and_echo.py

      - name: Commit results
        run: |
          git config user.name "revenue-agent-relay"
          git config user.email "actions@users.noreply.github.com"
          git add publish-results/
          if git diff --cached --quiet; then
            echo "No new results to commit"
          else
            git commit -m "Relay: dry-run validate + echo results [skip ci]"
            git push
          fi
